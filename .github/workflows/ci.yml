name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Check formatting
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            cargo fmt --all -- --check
          else
            cargo fmt --all -- --check || echo "::warning::Rust formatting issues found (not failing on push)"
          fi
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Install cargo-machete
        uses: taiki-e/install-action@cargo-machete
      - name: Check for unused dependencies
        run: cargo machete

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: PandaCSS codegen
        working-directory: web
        run: bunx panda codegen
      - name: Sync SvelteKit
        working-directory: web
        run: bunx svelte-kit sync
      - name: Check formatting
        working-directory: web
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bunx prettier --check .
          else
            bunx prettier --check . || echo "::warning::Frontend formatting issues found (not failing on push)"
          fi
      - name: Lint
        working-directory: web
        run: bun run lint
      - name: Type check
        working-directory: web
        run: bun run check --fail-on-warnings

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xevion
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: xevion
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://xevion:ci@localhost:5432/xevion
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli
      - name: Run migrations
        run: sqlx migrate run
        env:
          SQLX_OFFLINE: "false"
      - name: Verify sqlx offline cache
        run: cargo sqlx prepare --check
        env:
          SQLX_OFFLINE: "false"
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - name: Run tests
        run: cargo nextest run

  binding-verification:
    name: Binding Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SQLX_OFFLINE: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - name: Regenerate ts-rs bindings
        run: cargo test export_bindings_ || true
      - name: Check for stale bindings
        run: git diff --exit-code web/src/lib/bindings/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit
      - name: Rust security audit
        run: cargo audit
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
