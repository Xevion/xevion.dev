name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: "true"

jobs:
  rust-quality:
    name: Rust Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@4a8fc59f17870e646675458c2ac368e6b2d2716f # cargo-machete

      # Rust's include_dir!/include_bytes! macros need web/build/ at compile time.
      # Minimal stubs let cargo check/clippy compile without a full frontend build.
      - name: Create web/build stubs
        run: |
          mkdir -p web/build/client web/build/prerendered/errors
          echo "" > web/build/env.js

      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Check for unused dependencies
        run: cargo machete

  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile
      - name: Sync SvelteKit
        working-directory: web
        run: bunx svelte-kit sync
      - name: PandaCSS codegen
        working-directory: web
        run: bunx panda codegen
      - name: Check formatting
        working-directory: web
        run: bunx prettier --check .
      - name: Lint
        working-directory: web
        run: bun run lint
      - name: Type check
        working-directory: web
        run: bun run check --fail-on-warnings
      - name: Test
        working-directory: web
        run: bun run test
      - name: Build
        working-directory: web
        run: bunx --bun vite build
      # `vite build` is Rollup-only; this exercises dev-mode dep pre-bundling,
      # which is where a plugin/Vite peer mismatch actually breaks.
      - name: Verify dev dependency optimization
        working-directory: web
        run: bunx --bun vite optimize --force

  rust-tests:
    name: Rust Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine@sha256:e013e867e712fec275706a6c51c966f0bb0c93cfa8f51000f85a15f9865a28cb
        env:
          POSTGRES_USER: xevion
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: xevion
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://xevion:ci@localhost:5432/xevion
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: sqlx-cli,cargo-nextest
      - name: Create web/build stubs
        run: |
          mkdir -p web/build/client web/build/prerendered/errors
          echo "" > web/build/env.js
      - name: Run migrations
        run: sqlx migrate run
        env:
          SQLX_OFFLINE: "false"
      - name: Verify sqlx offline cache
        run: cargo sqlx prepare --check
        env:
          SQLX_OFFLINE: "false"
      - name: Run tests
        run: cargo nextest run

  binding-verification:
    name: Binding Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          cache-on-failure: true
      - name: Create web/build stubs
        run: |
          mkdir -p web/build/client web/build/prerendered/errors
          echo "" > web/build/env.js
      - name: Regenerate ts-rs bindings
        run: cargo test export_bindings_
      - name: Check for stale bindings
        run: git diff --exit-code web/src/lib/bindings/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: taiki-e/install-action@5626e41434f03ab3022d9685405c0645c879f441 # cargo-audit
      # RUSTSEC-2023-0071: rsa timing sidechannel, no fix available (transitive via sqlx)
      - name: Rust security audit
        run: cargo audit --ignore RUSTSEC-2023-0071
      - name: Run zizmor 🌈
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
